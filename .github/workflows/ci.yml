name: CI

on:
  push:
    branches: [main, develop, 'concept/*']
  pull_request:
    branches: [main]

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint PHP files
        run: |
          find public src -name '*.php' -print0 | xargs -0 -n1 php -l

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Create .env
        run: cp .env.example .env

      - name: Start PHP server
        run: |
          php -S localhost:8000 -t public &
          sleep 3

      - name: Run smoke tests
        run: |
          chmod +x tests/smoke/smoke-tests.sh
          bash tests/smoke/smoke-tests.sh http://localhost:8000

      - name: Upload sitemap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap
          path: public/sitemap.php
